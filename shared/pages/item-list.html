<div class="itemlist__header"></div>
<div class="itemlist__body">
	<h2 class="itemlist__title"></h2>
	<div class="itemlist__description"></div>
	<div class="itemlist__customblock hide"></div>

	<div class="itemlist__toolbar">
		<div class="itemlist__advsrch_btn hide">
			<span class="itemlist__advsrch_icon"></span>
			進階搜尋
		</div>

		<div class="itemlist__sort_wrapper hide">
			<div class="itemlist__sort_icon">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<path d="M3 6h18M6 12h12m-9 6h6"></path>
				</svg>
				<span>排序</span>
			</div>
			<select class="itemlist__sort_select" style="min-width: 80px;"></select>
		</div>

		<div class="itemlist__searchbar_wrapper hide">
			<div class="itemlist__searchbar_icon"></div>
			<input class="itemlist__searchbar_input" type="text" placeholder="搜尋名稱、效果..." />
		</div>
	</div>

	<div id="DataContainer" class="Item-list"></div>
</div>


<div class="advsrch__overlay">
  <div class="advsrch__modal-card">
    <div class="advsrch__modal-header">
      <h3>進階搜尋</h3>
      <button class="advsrch__modal-close-btn">&times;</button>
    </div>
    
    <div class="advsrch__modal-body">
    </div>
  </div>
</div>
