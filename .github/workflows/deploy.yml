name: Build and Deploy CSS to GitHub Pages

on:
  push:
    branches:
      - main # 當 push 到 main 分支時觸發。你可以改成你自己的主分支名稱

permissions:
  contents: write # 允許 Action 把編譯好的檔案推回 GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 複製 GitHub 上的程式碼到虛擬機
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: 設定 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm' # 自動快取 node_modules 加快下次打包速度

      # Step 3: 安裝 package.json 裡設定的 Lightning CSS 工具
      - name: Install Dependencies
        run: npm install

      # Step 4: 執行打包指令，將 main.css 打包並壓縮成 main.min.css
      - name: Compile and Minify CSS
        run: npm run build:css

      # Step 6: 部署到 GitHub Pages
      # 這個 Action 會自動建立一個 gh-pages 分支，並把 dist 資料夾內的成果塞進去
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 告訴 Action 要發布哪一個資料夾的成果
          branch: gh-pages # 部署的目標分支