<div class="itemlist__header">
	<select id="DropdownMenu" class="itemlist__tab_dropdown" style="min-width: 160px;"></select>
	<select id="DropdownMenu2" class="itemlist__tab_dropdown" style="min-width: 60px;"></select>
</div>
<div class="itemlist__body">
	<h2  id="Name" class="itemlist__title"></h2></h2>
	<div id="Description" class="itemlist__description"></div>

	<h4>戰鬥修正</h4>
	<table class="custom__statetable split-colume">
		<tr>
			<th>命中</th>
			<th>迴避</th>
			<th>發動</th>
			<th>抵抗</th>
			<th>看破</th>
			<th>物Ｄ</th>
			<th>魔Ｄ</th>
			<th>行動值</th>
			<th>生命力</th>
		</tr>
		<tr id="ArmSystemStateModifier"></tr>
	</table>

	<h4>稱號特典</h4>
	<div class="custom__information">
		<div id="ArmSystemEffect"></div>
	</div>
	<h4>類型 <span id="TypeName" style="font-size: 1.2em;"></span></h4>
	<div class="custom__information">
		<div id="ArmSystemTypeEffect"></div>
	</div>

	<h4>稱號天賦一覽</h4>
	<div id="TalentsContainer" class="Item-list talent"></div>
</div>
